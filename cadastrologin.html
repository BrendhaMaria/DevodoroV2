<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devodoro - Login</title>
<link rel="stylesheet" href="../static/css/cadlogin.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>
<body>

<div class="overlay">
  <div class="container">

    <h2>Acesso</h2>

    <!-- ROLE SWITCH -->
    <div class="role-switch" id="roleSwitch">
      <div class="role-indicator"></div>
      <button id="empresaBtn" class="active">Empresa</button>
      <button id="funcionarioBtn">Funcionário</button>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button id="loginTab" class="active">Login</button>
      <button id="registerTab">Cadastro</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm">
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Senha" required>
      <button class="submit">Entrar</button>
      <div class="switch">Não tem conta? <span id="goRegister">Criar</span></div>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" class="hidden">
      <input type="text" placeholder="Nome" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Senha" required>
      <button class="submit">Cadastrar</button>
      <div class="switch">Já tem conta? <span id="goLogin">Entrar</span></div>
    </form>

  </div>
</div>

<script>
const loginTab = document.getElementById('loginTab');
const registerTab = document.getElementById('registerTab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');

const empresaBtn = document.getElementById('empresaBtn');
const funcionarioBtn = document.getElementById('funcionarioBtn');
const roleSwitch = document.getElementById('roleSwitch');

let role = "empresa";

loginTab.onclick = () => {
  loginForm.classList.remove('hidden');
  registerForm.classList.add('hidden');
  loginTab.classList.add('active');
  registerTab.classList.remove('active');
}

registerTab.onclick = () => {
  loginForm.classList.add('hidden');
  registerForm.classList.remove('hidden');
  registerTab.classList.add('active');
  loginTab.classList.remove('active');
}

empresaBtn.onclick = () => {
  role = "empresa";
  roleSwitch.classList.remove('funcionario');
  empresaBtn.classList.add('active');
  funcionarioBtn.classList.remove('active');
}

funcionarioBtn.onclick = () => {
  role = "funcionario";
  roleSwitch.classList.add('funcionario');
  funcionarioBtn.classList.add('active');
  empresaBtn.classList.remove('active');
}

document.getElementById('goRegister').onclick = () => registerTab.click();
document.getElementById('goLogin').onclick = () => loginTab.click();

loginForm.onsubmit = (e)=>{
  e.preventDefault();
  alert(`Login como ${role}`);
}

registerForm.onsubmit = (e)=>{
  e.preventDefault();
  alert(`Cadastro como ${role}`);
}

</script>

</body>
</html>
